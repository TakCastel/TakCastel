<svg width="420" height="130" viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prehistopia">
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .t  { fill: #1f2328; }
    .d  { fill: #656d76; }
    .l  { fill: #0969da; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #161b22; stroke: #30363d; }
      .t  { fill: #e6edf3; }
      .d  { fill: #8b949e; }
      .l  { fill: #58a6ff; }
    }
  </style>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="418" height="128" rx="12" class="bg" stroke-width="1"/>
  <rect x="1" y="1" width="6" height="128" rx="3" fill="url(#g)"/>
  <circle cx="44" cy="65" r="24" fill="url(#g)" opacity="0.15"/>
  <text x="44" y="74" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="26">🦣</text>
  <text x="84" y="44" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" class="t">Prehistopia</text>
  <text x="400" y="42" text-anchor="end" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="14" class="l">↗</text>
  <text x="84" y="70" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="12.5" class="d">Neolithic city builder where every</text>
  <text x="84" y="88" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="12.5" class="d">building shapes your tribe's survival.</text>
  <circle cx="88" cy="108" r="3" fill="url(#g)"/>
  <text x="98" y="112" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="11.5" class="l">prehistopia.vercel.app</text>
